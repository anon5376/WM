  max_steps: 240
  wall_clock_seconds: null
  checkpoint_every_steps: 240
  log_every_steps: 60
  eval_every_seconds: null
loss_weights:
  grid: 1.0
  text: 1.0
  signal: 1.0
  events: 1.0

